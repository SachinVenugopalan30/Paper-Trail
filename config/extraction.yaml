pipeline:
  maas:
    enabled: false

  ocr_api:
    # Connection
    api_host: localhost
    api_port: 8080
    model: mlx-community/GLM-OCR-bf16

    # URL construction: {api_scheme}://{api_host}:{api_port}{api_path}
    api_scheme: null
    api_path: /chat/completions
    api_url: null

    # Authentication (not needed for local mlx-vlm)
    api_key: null
    headers: {}

    # SSL (disabled for local server)
    verify_ssl: false

    # Timeouts (seconds) - increase for large/complex images
    connect_timeout: 30
    request_timeout: 300

    # Retry settings
    retry_max_attempts: 3
    retry_backoff_base_seconds: 1.0
    retry_backoff_max_seconds: 30.0

page_loader:
  max_tokens: 4096
  temperature: 0.7
  image_format: JPEG
  min_pixels: 12544
  max_pixels: 71372800

extraction:
  # PDF to image conversion settings
  pdf_dpi: 200              # Lower DPI for faster OCR (150-200 recommended)
  image_quality: 95
  
  # Hybrid routing settings
  native_threshold: 0.8     # Coverage threshold for hybrid routing
  use_ocr_fallback: true
  
  # Batch processing
  batch_size: 10
  parallel_workers: 4

output:
  format: json
  save_images: false
  save_debug_info: true
